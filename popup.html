<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Re:Chrome</title>
    <style>
      :root {
        --bg: #e7ecf3;
        --surface: #e9eef5;
        --text: #4b5974;
        --muted: #7f8ca6;
        --accent: #6b83d1;
        --danger: #d95b7b;
        --shadow-light: #fbfdff;
        --shadow-dark: #c5cfdd;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        width: 340px;
        padding: 10px;
        box-sizing: border-box;
      }
      .panel {
        background: var(--surface);
        border-radius: 16px;
        box-shadow:
          6px 6px 12px var(--shadow-dark),
          -6px -6px 12px var(--shadow-light);
        padding: 16px 14px 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.15px;
        margin-bottom: 0;
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 7px;
        color: #68789a;
      }
      input[type="text"] {
        background: #e7edf5;
        border: none;
        border-radius: 12px;
        color: #4e5e7d;
        width: 100%;
        box-sizing: border-box;
        padding: 11px 13px;
        margin-bottom: 14px;
        outline: none;
        box-shadow:
          inset 4px 4px 9px #c8d1df,
          inset -4px -4px 9px #fdfefe;
        transition: box-shadow 0.2s ease;
      }
      input[type="text"]::placeholder {
        color: #9aa7c0;
      }
      input[type="text"]:focus {
        box-shadow:
          inset 3px 3px 6px #c8d1df,
          inset -3px -3px 6px #ffffff,
          0 0 0 2px rgba(107, 131, 209, 0.22);
      }
      button {
        background: #e7edf5;
        border: 0;
        border-radius: 12px;
        color: var(--accent);
        font-weight: 680;
        width: 100%;
        padding: 11px 10px;
        cursor: pointer;
        box-shadow:
          6px 6px 12px #c9d2e0,
          -6px -6px 12px #ffffff;
        transition: transform 0.15s ease, color 0.2s ease, box-shadow 0.2s ease;
      }
      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 8px;
      }
      button:hover {
        color: #5b75cb;
      }
      button:active {
        transform: translateY(1px);
        box-shadow:
          inset 4px 4px 8px #c7d0de,
          inset -4px -4px 8px #ffffff;
      }
      #status {
        margin-top: 10px;
        font-size: 11.5px;
        color: #7f8ca7;
        min-height: 0;
        line-height: 1.25;
      }
      #status:empty {
        display: none;
      }
      .error {
        color: var(--danger);
      }
      .footer {
        text-align: center;
        font-size: 11px;
        color: #8f9ab2;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(107, 131, 209, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="title">Re:Chrome</div>
      <div class="sub">Text Replace for Active Tab</div>

      <label for="from">置換前</label>
      <input id="from" type="text" placeholder="例: よろしくお願いします" />

      <label for="to">置換後</label>
      <input id="to" type="text" placeholder="例: よろしくお願いいたします" />

      <div class="button-row">
        <button id="replaceOneButton" type="button">1個ずつ置換</button>
        <button id="replaceAllButton" type="button">全部置換</button>
      </div>
      <div id="status"></div>
      <div id="versionInfo" class="footer">v-</div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
